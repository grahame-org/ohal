spec-version: "1.0.0"

vendor: "Texas Instruments"

family:
  name: "msp430fr2xx4xx"
  sub-families: [msp430fr2xx, msp430fr4xx]

arch-ref: "msp430"

architecture:
  name: "Texas Instruments MSP430"
  word-size: 16

reference:
  source: SLAU445
  title: MSP430FR4xx and MSP430FR2xx Family User's Guide
  revision: I
  last-modified: 2019-03

memory:
  references:
    sections: ["1.9.1"]
  note: >-
    The family guide describes a common memory-map layout for MSP430FR2xx/MSP430FR4xx.
    Several regions (RAM size and program FRAM size) vary by device; this skeleton records
    the inclusive ranges and annotates the variability. Vacant memory behaviour and
    access side-effects are described in the SYS chapter.
  map:
    - name: "Peripherals (with gaps)"
      start: 0x00000
      end: 0x00FFF
      verified: true
      note: >-
        Peripheral space; includes reserved system extension and descriptor metadata ranges.

    - name: Reserved for system extension
      start: 0x00000
      end: 0x000FF
      verified: true

    - name: Peripherals
      start: 0x00100
      end: 0x00FEF
      verified: true

    - name: Descriptor type
      start: 0x00FF0
      end: 0x00FF3
      verified: true

    - name: Start address of descriptor structure
      start: 0x00FF4
      end: 0x00FF7
      verified: true

    - name: "Information memory (FRAM)"
      start: 0x01800
      end: 0x019FF
      verified: true

    - name: "RAM - 8kb"
      start: 0x02000
      end: 0x03FFF
      verified: true

    - name: "RAM - 4kb"
      start: 0x02000
      end: 0x02FFF
      verified: true

    - name: "RAM - 2kb"
      start: 0x02000
      end: 0x027FF
      verified: true

    - name: "RAM - 1kb"
      start: 0x02000
      end: 0x023FF
      verified: true

    - name: "RAM - 512b"
      start: 0x02000
      end: 0x021FF
      verified: true

    - name: "Program memory - 32kb"
      start: 0x08000
      end: 0x0FFFF
      verified: true

    - name: "Program memory - 16kb"
      start: 0x0C000
      end: 0x0FFFF
      verified: true

    - name: "Program memory - 15kb"
      start: 0x0C400
      end: 0x0FFFF
      verified: true

    - name: "Program memory - 8kb"
      start: 0x0E000
      end: 0x0FFFF
      verified: true

    - name: "Program memory - 4kb"
      start: 0x0F000
      end: 0x0FFFF
      verified: true

    - name: "Program memory - 2kb"
      start: 0x0F800
      end: 0x0FFFF
      verified: true

    - name: "Program memory - 1kb"
      start: 0x0FC00
      end: 0x0FFFF
      verified: true

    - name: "Program memory - 512b"
      start: 0x0FE00
      end: 0x0FFFF
      verified: true

    - name: "Interrupt vectors"
      start: 0x0FF80
      end: 0x0FFFF
      verified: true
      note: "Vector table region (top of address space)."

definitions:
  settings:
    # Architecture-generic: canonical definition lives in docs/specs/common/arch/msp430.yml.
    # Repeated here because YAML anchors cannot span files.
    bit-value: &bit-value
      "0": reset
      "1": set
      
    dir-value: &dir-value
      "0": input
      "1": output

    ren-value: &ren-value
      "0": disabled
      "1": enabled

    ies-value: &ies-value
      "0": low-to-high
      "1": high-to-low

    ie-value: &ie-value
      "0": disabled
      "1": enabled

    ifg-value: &ifg-value
      "0": no interrupt pending
      "1": interrupt pending

