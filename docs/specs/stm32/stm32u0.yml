definitions:
  settings:
    gpio-mode: &gpio-mode
      "00": input mode
      "01": general purpose output mode
      "10": alternate function mode
      "11": analogue mode
    output-type: &output-type
      "0": Output push-pull
      "1": Output open-drain
    ospeed: &ospeed
      "00": Low speed
      "01": Medium speed
      "10": High speed
      "11": Very high speed
    pupdr: &pupdr
      "00": No pull-up, pull-down
      "01": Pull-up
      "10": Pull-down
      "11": Reserved
    bit-value: &bit-value
      "0": reset
      "1": set
    bsrr-br: &bsrr-br
      "0": No action on the corresponding ODx bit
      "1": Resets the corresponding ODx bit
    bsrr-bs: &bsrr-bs
      "0": No action on the corresponding ODx bit
      "1": Sets the corresponding ODx bit
    port-lock: &port-lock
      "0": Port configuration not locked
      "1": Port configuration locked
    afsel: &afsel
      "0000": AF0
      "0001": AF1
      "0010": AF2
      "0011": AF3
      "0100": AF4
      "0101": AF5
      "0110": AF6
      "0111": AF7
      "1000": AF8
      "1001": AF9
      "1010": AF10
      "1011": AF11
      "1100": AF12
      "1101": AF13
      "1110": AF14
      "1111": AF15
    brr: &brr
      "0": No action on the corresponding ODx bit
      "1": Reset the corresponding ODx bit
