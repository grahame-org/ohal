---
# .github/workflows/conventional-commits.yml
name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions: {}

jobs:
  check-title:
    name: check-title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@0723387bb0c33c634bf86b2f0dfadb3dbaef9beb # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            ci
            build
            refactor
            chore
          requireScope: false
