---
# .github/workflows/copilot-setup-steps.yml
name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions: {}

jobs:
  copilot-setup-steps:
    name: copilot-setup-steps
    runs-on: ubuntu-latest
    permissions: {}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Install apt tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang-format clang-tidy cmake shellcheck

      - name: Cache pip packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-cmakelang-yamllint-check-jsonschema

      - name: Install pip tools
        run: pip3 install cmakelang yamllint check-jsonschema

      - name: Install npm tools
        run: npm install -g markdownlint-cli2 prettier
